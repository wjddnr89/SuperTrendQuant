schema_version: 6

provider:
  name: yahoo_chart
  endpoint_template: "https://query1.finance.yahoo.com/v8/finance/chart/{symbol}"
  max_http_attempts: 400
  max_attempts_per_target: 1
  retry_count: 0
  timeout_seconds: 30
  max_response_bytes: 52428800
  access_class: personal_use_only_unofficial_keyless_json
  repository_visibility: private
  r2_visibility: private
  redistribution_allowed: false
  use_restriction: >-
    Yahoo chart data is permitted here only for the owner's personal,
    non-commercial use. The repository and R2 bucket must remain private and
    cached responses or derived Yahoo data must not be redistributed.
  stability_note: >-
    Yahoo's chart endpoint is unofficial and has no API SLA. One-attempt
    collection and immutable exact-byte raw response caches are mandatory.

events:
  action_types:
    - cash_merger
    - stock_merger
    - spinoff
    - ticker_change
    - delisting
  official_hosts:
    - sec.gov
  # Intermediate identity/ticker actions are not terminal lifecycle candidates,
  # so they do not have lifecycle-finalizer report records.  They must still be
  # backed by an exact archived payload from one of these reviewed official
  # sources and by an explicitly accepted provenance kind.
  official_provenance_hosts:
    - sec.gov
    - spglobal.com
    - investor.ovintiv.com
    - investors.qvcgrp.com
  official_provenance_source_kinds:
    - official_crosscheck
    - official_filing
    - official_filing_exit_mark
    - official_issuer_plus_sec_crosscheck
    - official_issuer_market_transition
  # Terminal actions are still required to match the lifecycle report one to
  # one.  Both the collector's normalized crosscheck rows and an original SEC
  # filing row are valid provenance when the URL/hash archive binding is exact.
  terminal_official_source_kinds:
    - official_crosscheck
    - official_filing
  # NTCO/NTCOY is deliberately not authorized through the broad host/source
  # allowlists above.  These are the only two transition event IDs eligible
  # for the separately code-pinned OCC/Cboe/BNY evidence path.
