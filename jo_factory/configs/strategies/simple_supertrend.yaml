name: simple_supertrend_default
type: simple_supertrend

portfolio:
  max_positions: 3
  allocation_pct: 0.9

signals:
  entries:
    - type: supertrend
      enabled: true
      period: 10
      multiplier: 3.0
      atr_method: wilder
      symbol_multipliers: {}
  filters:
    - type: benchmark_trend
      enabled: false
      timeframe: 1d
  exits:
    - type: supertrend_flip
      confirm_bars: 1
