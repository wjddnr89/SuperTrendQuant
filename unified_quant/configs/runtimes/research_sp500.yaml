name: research_sp500
market: US
universe:
  source: index_events
  profiles:
    US: [sp500]
  refresh: daily
  snapshot_dir: state/universes
  filters:
    enabled: false

data:
  timeframe: 1d
  period: max

capital:
  initial_cash: 10000

costs:
  fee_rate: 0.00225
  slippage_rate: 0.0005

execution:
  order_type: market
  broker: paper
  live_confirm_required: true

paper:
  state_file: state/research_sp500_paper.json
  results_dir: results/research/sp500/paper
  loop_interval_seconds: 60
  run_once_per_candle: true

backtest:
  results_dir: results/research/sp500/backtests
