# Nasdaq-100 point-in-time daily research runtime.
# Membership comes from stored anchors and actual effective-date events.

name: research_nasdaq100
market: US
universe:
  source: index_events
  profiles:
    US: [nasdaq100]
  refresh: daily
  snapshot_dir: state/universes
  filters:
    enabled: false

data:
  timeframe: 1d
  period: max

capital:
  initial_cash: 10000

costs:
  fee_rate: 0.00225
  slippage_rate: 0.0005

execution:
  order_type: market
  broker: paper
  live_confirm_required: true

paper:
  state_file: state/research_nasdaq100_paper.json
  results_dir: results/research/nasdaq100/paper
  loop_interval_seconds: 60
  run_once_per_candle: true

backtest:
  results_dir: results/research/nasdaq100/backtests
