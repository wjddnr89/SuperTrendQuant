name: triple_supertrend_alone
type: triple_filters

portfolio:
  max_positions: 5
  allocation_pct: 1.0

scoring:
  type: relative_strength
  params:
    lookback_bars: 100

signals:
  entries:
    - type: triple_supertrend
      enabled: true
      atr_method: wilder
      settings:
        - period: 10
          multiplier: 1.0
        - period: 11
          multiplier: 2.0
        - period: 12
          multiplier: 3.0

  filters: []

  exits:
    - type: triple_supertrend_flip
      down_count: 2
      confirm_bars: 3
