# This draft is deliberately separate from configs/us_cross_validation.yaml.
# Integration must add code-pinned authority for this complete 14-entry
# inventory first.  The active YAML alone must never authorize another ticker.
integration_requirements:
  - require all 14 entries as one complete inventory
  - verify each archived extract and provenance payload from source_archive
  - bind security_id, exact master and symbol-history interval, provider symbol,
    raw source hash, terminal event when present, and exact relation hash
  - recompute the full Triple Supertrend signal and require zero field differences
  - preserve explicit dividend, action, and factor gaps as non-passes
  - reject generic ticker reuse, missing currency, ETF collision, or symbol exceptions
  - require private/internal-only acknowledgement for local archive apply
  - keep redistribution and public publication blocked

