  minimum_overlap_sessions: 20
  minimum_session_coverage_ratio: 0.98
  close_relative_tolerance: 0.005
  ohl_relative_tolerance: 0.01
  absolute_price_tolerance_usd: 0.02
  scale_stability_relative_tolerance: 0.01
  minimum_split_regime_sessions: 3
  terminal_calendar_window_sessions: 60
  currency: USD
  instrument_type: EQUITY
  allowed_exchange_names:
    - ASE
    - BTS
    - NCM
    - NGM
    - NMS
    - NYQ
    - OQB
    - OQX
    - PCX
    - PNK
  exchange_timezone: America/New_York
  currency_basis: >-
    Both EODHD and Yahoo chart metadata must explicitly declare USD. A missing
    or different Yahoo currency is a mismatch and cannot be excepted.
  adjustment_basis: >-
    Yahoo indicators.quote raw OHLCV is used; indicators.adjclose is never
    used. For each regime bounded only by stored EODHD split/capital-reduction/
    stock-dividend events, the Yahoo/EODHD close ratio must be stable before
    its median scale may normalize OHLC. Every overlapping session is then
    checked; an unstable regime is a mismatch, never silently rescaled.
  volume_policy: record_only_not_compared
  # Yahoo no-data may replace an overlap only for an already verified terminal
  # identity transition. Spinoffs are intentionally excluded because the
  # parent security continues independently after the distribution.
  no_data_terminal_action_types:
    - delisting
    - cash_merger
    - stock_merger
    - ticker_change
  # These are the only legal/effective/last-price relations accepted by the
  # no-data path. Every relation still requires a complete 60-session local
  # terminal calendar and one exact official event/archive binding.
  no_data_terminal_date_relations:
    - event_on_terminal_session
    - event_on_next_xnys_session
    - legal_event_in_sessionless_gap_before_next_xnys
    - stored_non_session_boundary_then_next_xnys_event
    - event_session_after_last_trade
  # A generic successor no-data exception never satisfies this requirement.
  # The direct event-date/new-symbol interval must pass normally, unless the
  # source target is one of the separately code-pinned finite chains above.
  no_data_successor_validation_basis: exact_official_successor_identity_interval_with_passed_price_overlap
  delisted_exception_code: delisted_provider_unsupported
  # OLD LILA/LILAK are intentionally stored from Yahoo because EODHD has no
  # regular-way history for these retired tracking shares.  A second Yahoo
  # request would only compare Yahoo with itself, so publication instead
  # recomputes the already-pinned CC0 v3 overlap check from exact archived bytes.
  # The upstream provider behind the CC0 compilation is undisclosed; the report
  # must preserve that limitation and the 33-session uncrosschecked tail.
  pinned_external_overlaps:
    - symbol: LILA
      active_from: "2015-07-02"
