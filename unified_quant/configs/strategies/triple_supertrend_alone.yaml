name: triple_supertrend_alone
type: triple_filters

portfolio:
  max_positions: 10
  allocation_pct: 1.0

scoring:
  type: relative_strength
  params:
    lookback_bars: 100

signals:
  entries:
    - type: triple_supertrend
      enabled: true
      atr_method: wilder
      settings:
        - period: 10
          multiplier: 3
        - period: 60
          multiplier: 1.5
        - period: 200
          multiplier: 1.0

  filters: []

  exits:
    - type: triple_supertrend_flip
      down_count: 2
      confirm_bars: 3
