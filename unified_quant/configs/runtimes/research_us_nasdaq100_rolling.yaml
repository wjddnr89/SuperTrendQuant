# Nasdaq-100 point-in-time daily research runtime.
# Membership comes from stored anchors and actual effective-date events.

name: research_us_nasdaq100_rolling
market: US
universe:
  source: index_events
  profiles:
    US: [nasdaq100]
  refresh: daily
  snapshot_dir: state/universes
  filters:
    enabled: false

data:
  timeframe: 1d
  period: max

data_store:
  provider: parquet
  auto_sync: true
  signal_price_mode: total_return_adjusted
  dividend_withholding_rate: 0
  incomplete_action_policy: warn
  local_cache_dir: data/cache
  index_source_mode: best_effort
  publish_enabled: false
  r2:
    enabled: false
    endpoint_env: R2_ENDPOINT_URL
    bucket: ""
    prefix: supertrend-quant

capital:
  initial_cash: 10000

costs:
  fee_rate: 0.00225
  slippage_rate: 0.0005

execution:
  order_type: market
  broker: paper
  live_confirm_required: true

paper:
  state_file: state/research_us_nasdaq100_rolling_paper.json
  results_dir: results/research/us_nasdaq100_rolling/paper
  loop_interval_seconds: 60
  run_once_per_candle: true

backtest:
  results_dir: results/research/us_nasdaq100_rolling/backtests
