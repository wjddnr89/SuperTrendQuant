.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);

.form-range::-moz-range-track {

.form-range::-moz-range-thumb {

.form-range:disabled {

        &lt;div class=&quot;lane-node&quot;&gt;&lt;strong&gt;출처 해시&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;받은 원문을 SHA-256으로 고정&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;lane-node&quot;&gt;&lt;strong&gt;기업 ID&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;티커 대신 &lt;code&gt;security_id&lt;/code&gt; 사용&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;lane-node&quot;&gt;&lt;strong&gt;검증 게이트&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;스키마 · 날짜 · 경제 조건 · 가격 비교&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;lane-node&quot;&gt;&lt;strong&gt;불변 릴리스&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;검증된 버전 조합만 승인&lt;/span&gt;&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;lane&quot;&gt;
      &lt;strong class=&quot;lane-label&quot;&gt;저장 레인&lt;/strong&gt;
      &lt;div class=&quot;lane-track&quot;&gt;
        &lt;div class=&quot;lane-node&quot;&gt;&lt;strong&gt;&lt;code&gt;archives&lt;/code&gt;&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;공급자·공시 원본&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;lane-node&quot;&gt;&lt;strong&gt;&lt;code&gt;datasets&lt;/code&gt;&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;표준 Parquet 버전&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;lane-node&quot;&gt;&lt;strong&gt;&lt;code&gt;releases&lt;/code&gt;&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;10개 버전 묶음&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;lane-node&quot;&gt;&lt;strong&gt;비공개 R2&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;공유·복구·콜드 검증&lt;/span&gt;&lt;/div&gt;

    &lt;div class=&quot;lane&quot;&gt;
      &lt;strong class=&quot;lane-label&quot;&gt;소비 레인&lt;/strong&gt;

        &lt;div class=&quot;lane-node&quot;&gt;&lt;strong&gt;DuckDB&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;필요한 종목·기간만 조회&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;lane-node&quot;&gt;&lt;strong&gt;MarketData&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;가격 · 지수 일정 · 기업행동 결합&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;lane-node&quot;&gt;&lt;strong&gt;전략 엔진&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;Triple Supertrend 신호 계산&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;lane-node&quot;&gt;&lt;strong&gt;백테스트 결과&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;수익률 · 위험 · 거래 기록&lt;/span&gt;&lt;/div&gt;

  &lt;section id=&quot;real-example&quot; class=&quot;section&quot;&gt;
    &lt;div class=&quot;section-heading&quot;&gt;
      &lt;h2&gt;3. 실제 사례: HCBK 주식이 MTB 주식으로 바뀌는 과정&lt;/h2&gt;
      &lt;p&gt;하나의 주식교환 합병이 공시 원문에서 백테스트 포지션 전환까지 이동한 실제 데이터입니다.&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;example-grid&quot;&gt;
      &lt;ol class=&quot;journey-list&quot; aria-label=&quot;HCBK 주식교환 합병 처리 순서&quot;&gt;
        &lt;li class=&quot;journey-item&quot;&gt;
          &lt;span class=&quot;step-mark&quot;&gt;1&lt;/span&gt;
          &lt;div class=&quot;journey-copy&quot;&gt;&lt;strong&gt;마지막 가격과 기업을 찾는다&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;EODHD의 HCBK 가격과 종목 목록을 동일한 &lt;code&gt;security_id&lt;/code&gt;에 연결합니다.&lt;/span&gt;&lt;/div&gt;
        &lt;/li&gt;
        &lt;li class=&quot;journey-item&quot;&gt;
          &lt;span class=&quot;step-mark&quot;&gt;2&lt;/span&gt;
          &lt;div class=&quot;journey-copy&quot;&gt;&lt;strong&gt;SEC 공시 원문을 내려받는다&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;&lt;code&gt;SecEdgarLifecycleSource.fetch_filing()&lt;/code&gt;이 공시 원문과 해시를 보관합니다.&lt;/span&gt;&lt;/div&gt;
        &lt;/li&gt;
        &lt;li class=&quot;journey-item&quot;&gt;
          &lt;span class=&quot;step-mark&quot;&gt;3&lt;/span&gt;
          &lt;div class=&quot;journey-copy&quot;&gt;&lt;strong&gt;합병 조건을 구조화한다&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;&lt;code&gt;parse_sec_lifecycle_filing()&lt;/code&gt;이 완료일, 교환비율, 후속 티커를 추출합니다.&lt;/span&gt;&lt;/div&gt;
        &lt;/li&gt;
        &lt;li class=&quot;journey-item&quot;&gt;
          &lt;span class=&quot;step-mark&quot;&gt;4&lt;/span&gt;
          &lt;div class=&quot;journey-copy&quot;&gt;&lt;strong&gt;독립 가격으로 경제성을 확인한다&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;기존 HCBK 가치와 &lt;code&gt;0.08403 × MTB 가격&lt;/code&gt;의 연결을 비교합니다.&lt;/span&gt;&lt;/div&gt;
        &lt;/li&gt;
        &lt;li class=&quot;journey-item&quot;&gt;
          &lt;span class=&quot;step-mark&quot;&gt;5&lt;/span&gt;
          &lt;div class=&quot;journey-copy&quot;&gt;&lt;strong&gt;백테스트 포지션을 전환한다&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;&lt;code&gt;PortfolioLedger.apply_actions()&lt;/code&gt;가 HCBK 수량을 MTB 수량으로 바꿉니다.&lt;/span&gt;&lt;/div&gt;
        &lt;/li&gt;
      &lt;/ol&gt;
      &lt;div class=&quot;code-pair&quot;&gt;
        &lt;pre class=&quot;card code-block&quot; aria-label=&quot;실제 corporate_actions 데이터 예시&quot;&gt;&lt;code&gt;{
  &quot;action_type&quot;: &quot;stock_merger&quot;,
  &quot;effective_date&quot;: &quot;2015-11-02&quot;,
  &quot;security&quot;: &quot;HCBK&quot;,
  &quot;ratio&quot;: 0.08403,
  &quot;new_symbol&quot;: &quot;MTB&quot;,
  &quot;official&quot;: true,
  &quot;source_kind&quot;: &quot;official_crosscheck&quot;
}&lt;/code&gt;&lt;/pre&gt;
        &lt;pre class=&quot;card code-block&quot; aria-label=&quot;실제 처리 코드 축약 예시&quot;&gt;&lt;code&gt;evidence = sec_source.collect(candidate)
event = parse_sec_lifecycle_filing(
    evidence.content, candidate, evidence.filing
)
repository.append_frame(
    &quot;corporate_actions&quot;,
    lifecycle_action_record(event, ...)
)
ledger.apply_actions(actions, through=session)&lt;/code&gt;&lt;/pre&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;data-inventory&quot; class=&quot;section&quot;&gt;
    &lt;div class=&quot;section-heading&quot;&gt;
      &lt;h2&gt;4. 최종 릴리스를 구성하는 10개 데이터셋&lt;/h2&gt;
      &lt;p&gt;행 수는 2026-07-15 완료 세션을 고정한 릴리스 기준입니다.&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;table-responsive&quot;&gt;
      &lt;table class=&quot;table table-sm&quot;&gt;
        &lt;thead&gt;
          &lt;tr&gt;&lt;th&gt;데이터셋&lt;/th&gt;&lt;th&gt;역할&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;행 수&lt;/th&gt;&lt;th&gt;주요 생산 함수&lt;/th&gt;&lt;th&gt;주요 사용처&lt;/th&gt;&lt;/tr&gt;
        &lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;security_master&lt;/code&gt;&lt;/td&gt;&lt;td&gt;기업의 변하지 않는 식별자와 기본 속성&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;876&lt;/td&gt;&lt;td&gt;&lt;code&gt;build_eodhd_catalog()&lt;/code&gt;&lt;/td&gt;&lt;td&gt;모든 데이터의 기업 연결&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;symbol_history&lt;/code&gt;&lt;/td&gt;&lt;td&gt;한 기업이 사용한 과거 티커 구간&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;903&lt;/td&gt;&lt;td&gt;&lt;code&gt;resolve_new_security_id()&lt;/code&gt;&lt;/td&gt;&lt;td&gt;티커 변경과 이름 재사용 분리&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;daily_price_raw&lt;/code&gt;&lt;/td&gt;&lt;td&gt;조정 전 일봉 OHLCV&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;2,095,793&lt;/td&gt;&lt;td&gt;&lt;code&gt;EodhdDailySource.fetch()&lt;/code&gt;&lt;/td&gt;&lt;td&gt;신호 가격과 체결 가격의 원재료&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;corporate_actions&lt;/code&gt;&lt;/td&gt;&lt;td&gt;배당·분할·합병·분사·티커·상장폐지&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;24,053&lt;/td&gt;&lt;td&gt;&lt;code&gt;parse_sec_lifecycle_filing()&lt;/code&gt;&lt;/td&gt;&lt;td&gt;조정계수와 포지션 전환&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;adjustment_factors&lt;/code&gt;&lt;/td&gt;&lt;td&gt;분할 및 총수익 조정계수&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;2,095,793&lt;/td&gt;&lt;td&gt;&lt;code&gt;build_adjustment_factors()&lt;/code&gt;&lt;/td&gt;&lt;td&gt;비교 가능한 장기 수익률&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;index_constituent_anchors&lt;/code&gt;&lt;/td&gt;&lt;td&gt;특정 기준일의 지수 구성원&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;605&lt;/td&gt;&lt;td&gt;&lt;code&gt;IndexDataImporter.import_anchor()&lt;/code&gt;&lt;/td&gt;&lt;td&gt;과거 지수 복원의 시작점&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;index_membership_events&lt;/code&gt;&lt;/td&gt;&lt;td&gt;지수 편입·퇴출 이벤트&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;793&lt;/td&gt;&lt;td&gt;&lt;code&gt;IndexDataImporter.import_events()&lt;/code&gt;&lt;/td&gt;&lt;td&gt;시점별 투자 가능 종목&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;lifecycle_resolutions&lt;/code&gt;&lt;/td&gt;&lt;td&gt;가격이 끝난 종목의 처리 결론&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;181&lt;/td&gt;&lt;td&gt;&lt;code&gt;build_lifecycle_candidates()&lt;/code&gt;&lt;/td&gt;&lt;td&gt;방치된 상장폐지·합병 방지&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;cross_validation_reports&lt;/code&gt;&lt;/td&gt;&lt;td&gt;검증 결과와 정책 해시&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;1&lt;/td&gt;&lt;td&gt;&lt;code&gt;validate_cross_validation_gate()&lt;/code&gt;&lt;/td&gt;&lt;td&gt;릴리스·R2 게시 허가&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;source_archive&lt;/code&gt;&lt;/td&gt;&lt;td&gt;원본 파일의 위치와 해시 색인&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;2,534&lt;/td&gt;&lt;td&gt;&lt;code&gt;DailyDataSynchronizer._archive()&lt;/code&gt;&lt;/td&gt;&lt;td&gt;재현·감사·분쟁 확인&lt;/td&gt;&lt;/tr&gt;
        &lt;/tbody&gt;
        &lt;tfoot&gt;
          &lt;tr&gt;&lt;th colspan=&quot;2&quot;&gt;합계&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;4,221,532&lt;/th&gt;&lt;th colspan=&quot;2&quot;&gt;하나의 불변 릴리스로 묶음&lt;/th&gt;&lt;/tr&gt;
        &lt;/tfoot&gt;
      &lt;/table&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section class=&quot;section&quot; aria-labelledby=&quot;storage-heading&quot;&gt;
    &lt;div class=&quot;section-heading&quot;&gt;
      &lt;h2 id=&quot;storage-heading&quot;&gt;5. 어디에 저장되고 무엇이 다음에 읽는가&lt;/h2&gt;
      &lt;p&gt;로컬은 작업과 검증을 담당하고, R2는 승인된 릴리스의 공유·복구·독립 재검증을 담당합니다.&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;storage-map&quot;&gt;
      &lt;article class=&quot;storage-column&quot;&gt;
        &lt;h3&gt;로컬 작업 저장소&lt;/h3&gt;
        &lt;pre class=&quot;tree&quot;&gt;&lt;code&gt;data/cache/
├─ state/          수집 중간 상태
├─ archives/       압축 원본 증거
├─ datasets/       Parquet 버전
├─ transactions/   수정 작업 기록
├─ conflicts/      충돌 격리
└─ releases/       승인된 버전 묶음&lt;/code&gt;&lt;/pre&gt;
        &lt;p class=&quot;text-small&quot;&gt;&lt;strong&gt;쓰는 쪽:&lt;/strong&gt; 수집·보정·검증 함수&lt;/p&gt;
      &lt;/article&gt;
      &lt;article class=&quot;storage-column&quot;&gt;
        &lt;h3&gt;비공개 Cloudflare R2&lt;/h3&gt;
        &lt;pre class=&quot;tree&quot;&gt;&lt;code&gt;super-trend-quant-parquet/
└─ supertrend-quant/
   ├─ datasets/.../versions/
   ├─ datasets/.../current.json
   ├─ archives/
   └─ releases/current.json&lt;/code&gt;&lt;/pre&gt;
        &lt;p class=&quot;text-small&quot;&gt;&lt;strong&gt;쓰는 쪽:&lt;/strong&gt; &lt;code&gt;publish_and_verify()&lt;/code&gt; 전용 경로&lt;/p&gt;
      &lt;/article&gt;
      &lt;article class=&quot;storage-column&quot;&gt;
        &lt;h3&gt;연구 실행 저장소&lt;/h3&gt;
        &lt;pre class=&quot;tree&quot;&gt;&lt;code&gt;Parquet release
  ↓ DuckDB SQL
MarketData
  ↓ strategy engine
BacktestResult
  ↓ save_backtest_result()
results/...&lt;/code&gt;&lt;/pre&gt;
        &lt;p class=&quot;text-small&quot;&gt;&lt;strong&gt;읽는 쪽:&lt;/strong&gt; 백테스트·연구·향후 Paper/Live&lt;/p&gt;
      &lt;/article&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section id=&quot;validation&quot; class=&quot;section&quot;&gt;
    &lt;div class=&quot;section-heading&quot;&gt;
      &lt;h2&gt;6. 여섯 개 검증 게이트를 모두 통과해야 게시된다&lt;/h2&gt;
      &lt;p&gt;“파일이 존재한다”가 아니라 내용, 관계, 경제적 의미, 원격 복구 가능성까지 확인합니다.&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;status-strip&quot; aria-label=&quot;6개 검증 게이트 모두 통과&quot;&gt;
      &lt;div class=&quot;status-segment&quot;&gt;&lt;strong&gt;1&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;스키마&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;status-segment&quot;&gt;&lt;strong&gt;2&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;기업 관계&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;status-segment&quot;&gt;&lt;strong&gt;3&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;라이프사이클&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;status-segment&quot;&gt;&lt;strong&gt;4&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;독립 가격&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;status-segment&quot;&gt;&lt;strong&gt;5&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;릴리스 해시&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;status-segment&quot;&gt;&lt;strong&gt;6&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;콜드 복원&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;gate-grid&quot;&gt;
      &lt;ol class=&quot;gate-list&quot; aria-label=&quot;검증 게이트 상세 설명&quot;&gt;
        &lt;li class=&quot;gate-item&quot;&gt;&lt;span class=&quot;step-mark&quot;&gt;1&lt;/span&gt;&lt;div class=&quot;gate-copy&quot;&gt;&lt;strong&gt;&lt;code&gt;validate_dataset()&lt;/code&gt;&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;필수 열, 기본키 중복, 날짜, OHLC 관계, 출처 메타데이터를 검사합니다.&lt;/span&gt;&lt;/div&gt;&lt;/li&gt;
        &lt;li class=&quot;gate-item&quot;&gt;&lt;span class=&quot;step-mark&quot;&gt;2&lt;/span&gt;&lt;div class=&quot;gate-copy&quot;&gt;&lt;strong&gt;&lt;code&gt;validate_repository_snapshot()&lt;/code&gt;&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;가격·티커·기업행동·지수 이벤트가 같은 기업 ID와 시점을 가리키는지 검사합니다.&lt;/span&gt;&lt;/div&gt;&lt;/li&gt;
        &lt;li class=&quot;gate-item&quot;&gt;&lt;span class=&quot;step-mark&quot;&gt;3&lt;/span&gt;&lt;div class=&quot;gate-copy&quot;&gt;&lt;strong&gt;라이프사이클 커버리지&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;후보 181건 중 169건 적용, 12건 영구 예외, 열린 항목 0건을 확인합니다.&lt;/span&gt;&lt;/div&gt;&lt;/li&gt;
        &lt;li class=&quot;gate-item&quot;&gt;&lt;span class=&quot;step-mark&quot;&gt;4&lt;/span&gt;&lt;div class=&quot;gate-copy&quot;&gt;&lt;strong&gt;&lt;code&gt;validate_cross_validation_gate()&lt;/code&gt;&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;이벤트 202건과 가격 대상 296건을 검증해 불일치·미해결 0건을 확인합니다.&lt;/span&gt;&lt;/div&gt;&lt;/li&gt;
        &lt;li class=&quot;gate-item&quot;&gt;&lt;span class=&quot;step-mark&quot;&gt;5&lt;/span&gt;&lt;div class=&quot;gate-copy&quot;&gt;&lt;strong&gt;&lt;code&gt;commit_release()&lt;/code&gt;&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;10개 데이터셋의 정확한 버전과 SHA-256을 하나의 릴리스로 고정합니다.&lt;/span&gt;&lt;/div&gt;&lt;/li&gt;
        &lt;li class=&quot;gate-item&quot;&gt;&lt;span class=&quot;step-mark&quot;&gt;6&lt;/span&gt;&lt;div class=&quot;gate-copy&quot;&gt;&lt;strong&gt;&lt;code&gt;publish_and_verify()&lt;/code&gt;&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;R2 비공개 확인 후 게시하고 새 임시 폴더로 전부 다시 내려받아 해시를 비교합니다.&lt;/span&gt;&lt;/div&gt;&lt;/li&gt;
      &lt;/ol&gt;
      &lt;article class=&quot;card&quot;&gt;
        &lt;h3&gt;이번 릴리스의 검증 결과&lt;/h3&gt;
        &lt;table class=&quot;table table-sm&quot;&gt;
          &lt;tbody&gt;
            &lt;tr&gt;&lt;th&gt;이벤트 검사&lt;/th&gt;&lt;td class=&quot;text-end&quot;&gt;202건&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;th&gt;가격 검사&lt;/th&gt;&lt;td class=&quot;text-end&quot;&gt;296건&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;th&gt;검증 증거&lt;/th&gt;&lt;td class=&quot;text-end&quot;&gt;657건&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;th&gt;가격 비교 세션&lt;/th&gt;&lt;td class=&quot;text-end&quot;&gt;245,523개&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;th&gt;최종 불일치&lt;/th&gt;&lt;td class=&quot;text-end&quot;&gt;0건&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;th&gt;최종 미해결&lt;/th&gt;&lt;td class=&quot;text-end&quot;&gt;0건&lt;/td&gt;&lt;/tr&gt;
            &lt;tr&gt;&lt;th&gt;콜드 재다운로드&lt;/th&gt;&lt;td class=&quot;text-end&quot;&gt;통과&lt;/td&gt;&lt;/tr&gt;
          &lt;/tbody&gt;
        &lt;/table&gt;
        &lt;p class=&quot;text-small&quot;&gt;스냅샷 SHA-256: &lt;code&gt;d65978ce27669c906b3dcacfa4f1a40f31e9ed68abf51d293e41ac07ed88a29e&lt;/code&gt;&lt;/p&gt;
      &lt;/article&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section class=&quot;section&quot; aria-labelledby=&quot;code-heading&quot;&gt;
    &lt;div class=&quot;section-heading&quot;&gt;
      &lt;h2 id=&quot;code-heading&quot;&gt;7. 실제 코드에서의 호출 순서&lt;/h2&gt;
      &lt;p&gt;아래는 구현을 읽기 쉽게 축약한 것이며 함수 이름과 데이터셋 이름은 실제 코드와 같습니다.&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;code-pair&quot;&gt;
      &lt;pre class=&quot;card code-block&quot; aria-label=&quot;수집부터 릴리스까지 코드 예시&quot;&gt;&lt;code&gt;# 1. 종목·지수·가격 수집
history = fetch_us_index_history(start_date=&quot;2015-01-01&quot;)
catalog = build_eodhd_catalog(history.symbols, ...)
synced = DailyDataSynchronizer(
    repository,
    price_source=EodhdDailySource()
).sync(&quot;2026-07-15&quot;)

# 2. 조정계수와 로컬 릴리스
factors = build_adjustment_factors(prices, actions)
repository.write_frame(&quot;adjustment_factors&quot;, factors, ...)
release = repository.commit_release(
    &quot;2026-07-15&quot;, dataset_versions, quality=&quot;degraded&quot;
)&lt;/code&gt;&lt;/pre&gt;
      &lt;pre class=&quot;card code-block&quot; aria-label=&quot;검증부터 백테스트까지 코드 예시&quot;&gt;&lt;code&gt;# 3. 교차검증과 R2 게시
validate_cross_validation_gate(repository, release)
summary = publish_and_verify(
    repository, r2_store,
    verify_only=False,
    keep_verify_cache=False
)

# 4. 백테스트 소비
data = ParquetMarketDataProvider(&quot;data/cache&quot;).load(
    config, symbols, universe_schedule=schedule
)
result = run_backtest_on_data(config, data)&lt;/code&gt;&lt;/pre&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;section class=&quot;section&quot; aria-labelledby=&quot;consumer-heading&quot;&gt;
    &lt;div class=&quot;section-heading&quot;&gt;
      &lt;h2 id=&quot;consumer-heading&quot;&gt;8. 백테스트는 승인된 릴리스만 읽는다&lt;/h2&gt;
      &lt;p&gt;전략이 공급자 API를 직접 호출하지 않기 때문에 같은 릴리스로 같은 연구를 반복할 수 있습니다.&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;consumer-flow&quot; aria-label=&quot;릴리스에서 백테스트 결과까지의 흐름&quot;&gt;
      &lt;div class=&quot;consumer-node&quot;&gt;&lt;strong&gt;&lt;code&gt;resolve_universe()&lt;/code&gt;&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;당시 지수 구성 복원&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;consumer-node&quot;&gt;&lt;strong&gt;&lt;code&gt;ParquetMarketDataProvider.load()&lt;/code&gt;&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;DuckDB로 필요한 행만 조회&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;consumer-node&quot;&gt;&lt;strong&gt;&lt;code&gt;MarketData&lt;/code&gt;&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;가격·행동·일정 결합&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;consumer-node&quot;&gt;&lt;strong&gt;&lt;code&gt;run_backtest_on_data()&lt;/code&gt;&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;전략 신호·주문·체결&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;consumer-node&quot;&gt;&lt;strong&gt;&lt;code&gt;BacktestResult&lt;/code&gt;&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;성과·위험·경고·릴리스 기록&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;p class=&quot;text-small&quot;&gt;
      일반화하면 매일 새 완료 세션에 대해 같은 절차를 반복합니다. 달라지는 것은 날짜와 데이터 버전뿐이며,
      원본 보관 → 검증 → 릴리스 → 게시 → 소비라는 계약은 유지됩니다.
    &lt;/p&gt;
  &lt;/section&gt;

  &lt;section class=&quot;section&quot; aria-labelledby=&quot;roadmap-heading&quot;&gt;
    &lt;div class=&quot;section-heading&quot;&gt;
      &lt;h2 id=&quot;roadmap-heading&quot;&gt;9. 다음 확장 계획&lt;/h2&gt;
      &lt;p&gt;현재 미국 S&amp;amp;P 500·Nasdaq-100에서 검증한 구조를 유지하면서 범위만 단계적으로 넓힙니다.&lt;/p&gt;
    &lt;/div&gt;
    &lt;ol class=&quot;roadmap-list&quot;&gt;
      &lt;li class=&quot;roadmap-item&quot;&gt;&lt;span class=&quot;step-mark&quot;&gt;1&lt;/span&gt;&lt;div class=&quot;roadmap-copy&quot;&gt;&lt;strong&gt;Russell 3000&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;종목 수와 상장폐지 비중이 크게 늘어나므로 지수 이력 공급자와 라이프사이클 자동화부터 보강합니다.&lt;/span&gt;&lt;/div&gt;&lt;/li&gt;
      &lt;li class=&quot;roadmap-item&quot;&gt;&lt;span class=&quot;step-mark&quot;&gt;2&lt;/span&gt;&lt;div class=&quot;roadmap-copy&quot;&gt;&lt;strong&gt;KOSPI 200 · KOSDAQ 150&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;KRX 종목·지수·기업행동 자료를 같은 10개 데이터 계약에 맞추고 한국 시장 달력과 권리락 규칙을 추가합니다.&lt;/span&gt;&lt;/div&gt;&lt;/li&gt;
      &lt;li class=&quot;roadmap-item&quot;&gt;&lt;span class=&quot;step-mark&quot;&gt;3&lt;/span&gt;&lt;div class=&quot;roadmap-copy&quot;&gt;&lt;strong&gt;일봉 운영 자동화&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;EODHD 호출 예산, 완료 세션, 검증 게이트, 비공개 R2 게시를 정해진 운영 절차로 자동화합니다.&lt;/span&gt;&lt;/div&gt;&lt;/li&gt;
      &lt;li class=&quot;roadmap-item&quot;&gt;&lt;span class=&quot;step-mark&quot;&gt;4&lt;/span&gt;&lt;div class=&quot;roadmap-copy&quot;&gt;&lt;strong&gt;검증 공급자 다변화&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;Yahoo 단일 가격 비교 의존도를 낮추고 공식 거래소 또는 추가 가격 공급자를 중요 이벤트부터 연결합니다.&lt;/span&gt;&lt;/div&gt;&lt;/li&gt;
    &lt;/ol&gt;
  &lt;/section&gt;

  &lt;section id=&quot;appendix&quot; class=&quot;section&quot;&gt;
    &lt;div class=&quot;section-heading&quot;&gt;
      &lt;h2&gt;부록 A. 알려진 한계와 영구 예외&lt;/h2&gt;
      &lt;p&gt;현재 릴리스의 &lt;code&gt;quality=degraded&lt;/code&gt;는 검증 실패가 아니라 아래 한계를 숨기지 않고 표시한 결과입니다.&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;appendix-note&quot;&gt;
      &lt;p&gt;&lt;strong&gt;영구 예외 12건은 검증을 통과한 정상 이벤트로 위장하지 않습니다.&lt;/strong&gt; 각 예외는 이유, 근거 URL, 원본 해시, 적용 정책을 별도로 고정하며 내용이 바뀌면 게시가 중단됩니다.&lt;/p&gt;
    &lt;/div&gt;
    &lt;ul class=&quot;risk-list&quot;&gt;
      &lt;li class=&quot;risk-item&quot;&gt;&lt;span class=&quot;step-mark&quot;&gt;!&lt;/span&gt;&lt;div class=&quot;risk-copy&quot;&gt;&lt;strong&gt;UTX 분사 대가&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;정확한 CARR 1.0주와 OTIS 0.5주 분배가 현재 표준 행동 모델에 완전히 반영되지 않아 지원되지 않는 대가로 남습니다.&lt;/span&gt;&lt;/div&gt;&lt;/li&gt;
      &lt;li class=&quot;risk-item&quot;&gt;&lt;span class=&quot;step-mark&quot;&gt;!&lt;/span&gt;&lt;div class=&quot;risk-copy&quot;&gt;&lt;strong&gt;ABMD 조건부가치권리&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;보장된 주당 380달러만 반영하며 최대 35달러 CVR은 0달러 하한으로 처리해 수익이 과소평가될 수 있습니다.&lt;/span&gt;&lt;/div&gt;&lt;/li&gt;
      &lt;li class=&quot;risk-item&quot;&gt;&lt;span class=&quot;step-mark&quot;&gt;!&lt;/span&gt;&lt;div class=&quot;risk-copy&quot;&gt;&lt;strong&gt;CELG/BMYRT 거래 경로&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;공식 첫 거래 종가 2.30달러를 청산 표식으로 사용하며 전체 280세션 거래 경로는 지원하지 않습니다.&lt;/span&gt;&lt;/div&gt;&lt;/li&gt;
      &lt;li class=&quot;risk-item&quot;&gt;&lt;span class=&quot;step-mark&quot;&gt;!&lt;/span&gt;&lt;div class=&quot;risk-copy&quot;&gt;&lt;strong&gt;FRCB 공급자 원본 수정&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;2024-12-30 저가 0을 0.003으로 해시 고정 교정했으며 다른 필드는 그대로 유지했습니다.&lt;/span&gt;&lt;/div&gt;&lt;/li&gt;
      &lt;li class=&quot;risk-item&quot;&gt;&lt;span class=&quot;step-mark&quot;&gt;!&lt;/span&gt;&lt;div class=&quot;risk-copy&quot;&gt;&lt;strong&gt;NTCO/NTCOY 경계&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;가격·티커·최종 현금 지급은 공식 자료로 보완했지만 충돌한 공급자 배당 두 건은 채택하지 않았습니다.&lt;/span&gt;&lt;/div&gt;&lt;/li&gt;
      &lt;li class=&quot;risk-item&quot;&gt;&lt;span class=&quot;step-mark&quot;&gt;!&lt;/span&gt;&lt;div class=&quot;risk-copy&quot;&gt;&lt;strong&gt;Quandl WIKI 증거의 이용 범위&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;정식 라이선스가 불명확한 동결 자료는 개인·내부 검증에만 사용하며 공개 재배포하지 않습니다.&lt;/span&gt;&lt;/div&gt;&lt;/li&gt;
    &lt;/ul&gt;
  &lt;/section&gt;

  &lt;section class=&quot;section&quot; aria-labelledby=&quot;technical-heading&quot;&gt;
    &lt;div class=&quot;section-heading&quot;&gt;
      &lt;h2 id=&quot;technical-heading&quot;&gt;부록 B. 함수별 입력·출력·저장·사용처&lt;/h2&gt;
      &lt;p&gt;운영 담당자가 장애나 데이터 질문을 추적할 때 사용하는 빠른 참조표입니다.&lt;/p&gt;
    &lt;/div&gt;
    &lt;div class=&quot;table-responsive&quot;&gt;
      &lt;table class=&quot;table table-sm&quot;&gt;
        &lt;thead&gt;&lt;tr&gt;&lt;th&gt;함수&lt;/th&gt;&lt;th&gt;받는 것&lt;/th&gt;&lt;th&gt;만드는 것&lt;/th&gt;&lt;th&gt;저장 위치&lt;/th&gt;&lt;th&gt;다음 호출&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;
        &lt;tbody&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;fetch_us_index_history()&lt;/code&gt;&lt;/td&gt;&lt;td&gt;시작일&lt;/td&gt;&lt;td&gt;지수 anchor·편입·퇴출 원본&lt;/td&gt;&lt;td&gt;&lt;code&gt;state&lt;/code&gt;·&lt;code&gt;archives&lt;/code&gt;&lt;/td&gt;&lt;td&gt;&lt;code&gt;IndexDataImporter&lt;/code&gt;&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;build_eodhd_catalog()&lt;/code&gt;&lt;/td&gt;&lt;td&gt;지수 티커 목록&lt;/td&gt;&lt;td&gt;기업 ID·티커 이력&lt;/td&gt;&lt;td&gt;&lt;code&gt;security_master&lt;/code&gt;·&lt;code&gt;symbol_history&lt;/code&gt;&lt;/td&gt;&lt;td&gt;&lt;code&gt;DailyDataSynchronizer&lt;/code&gt;&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;EodhdDailySource.fetch()&lt;/code&gt;&lt;/td&gt;&lt;td&gt;기업 ID와 공급자 티커&lt;/td&gt;&lt;td&gt;OHLCV·배당·분할·원본&lt;/td&gt;&lt;td&gt;&lt;code&gt;daily_price_raw&lt;/code&gt;·&lt;code&gt;corporate_actions&lt;/code&gt;·&lt;code&gt;archives&lt;/code&gt;&lt;/td&gt;&lt;td&gt;&lt;code&gt;build_adjustment_factors()&lt;/code&gt;&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;SecEdgarLifecycleSource.collect()&lt;/code&gt;&lt;/td&gt;&lt;td&gt;가격이 끝난 기업 후보&lt;/td&gt;&lt;td&gt;관련 공시와 파싱 결과&lt;/td&gt;&lt;td&gt;&lt;code&gt;archives&lt;/code&gt;·수집 보고서&lt;/td&gt;&lt;td&gt;&lt;code&gt;lifecycle_action_record()&lt;/code&gt;&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;build_adjustment_factors()&lt;/code&gt;&lt;/td&gt;&lt;td&gt;가격과 기업행동&lt;/td&gt;&lt;td&gt;분할·총수익 계수&lt;/td&gt;&lt;td&gt;&lt;code&gt;adjustment_factors&lt;/code&gt;&lt;/td&gt;&lt;td&gt;&lt;code&gt;ParquetMarketDataProvider.load()&lt;/code&gt;&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;validate_cross_validation_gate()&lt;/code&gt;&lt;/td&gt;&lt;td&gt;릴리스와 검증 증거&lt;/td&gt;&lt;td&gt;불일치·예외·가격 비교 결과&lt;/td&gt;&lt;td&gt;&lt;code&gt;cross_validation_reports&lt;/code&gt;&lt;/td&gt;&lt;td&gt;&lt;code&gt;publish_and_verify()&lt;/code&gt;&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;publish_repository()&lt;/code&gt;&lt;/td&gt;&lt;td&gt;로컬 불변 버전&lt;/td&gt;&lt;td&gt;R2 객체와 조건부 current 포인터&lt;/td&gt;&lt;td&gt;비공개 R2&lt;/td&gt;&lt;td&gt;&lt;code&gt;DatasetCache.sync_release()&lt;/code&gt;&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;ParquetMarketDataProvider.load()&lt;/code&gt;&lt;/td&gt;&lt;td&gt;릴리스·종목·기간·지수 일정&lt;/td&gt;&lt;td&gt;&lt;code&gt;MarketData&lt;/code&gt;&lt;/td&gt;&lt;td&gt;메모리&lt;/td&gt;&lt;td&gt;&lt;code&gt;run_backtest_on_data()&lt;/code&gt;&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;&lt;code&gt;PortfolioLedger.apply_actions()&lt;/code&gt;&lt;/td&gt;&lt;td&gt;포지션과 기업행동&lt;/td&gt;&lt;td&gt;현금·후속 주식·종목 전환&lt;/td&gt;&lt;td&gt;백테스트 원장&lt;/td&gt;&lt;td&gt;성과 계산&lt;/td&gt;&lt;/tr&gt;
        &lt;/tbody&gt;
      &lt;/table&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;footer class=&quot;text-small text-muted&quot;&gt;
    &lt;p&gt;수치는 완료 세션 2026-07-15 및 릴리스 &lt;code&gt;20260715-20260719T130946573430Z&lt;/code&gt;의 고정 스냅샷입니다. 이후 릴리스에서도 동일한 데이터 계약과 검증 순서를 반복합니다.&lt;/p&gt;
  &lt;/footer&gt;

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&#x27;stq-market-data-pipeline&#x27;);
      const buttons = Array.from(root.querySelectorAll(&#x27;[data-stage]&#x27;));
      const fields = {
        number: root.querySelector(&#x27;#stage-number&#x27;),
        title: root.querySelector(&#x27;#stage-title&#x27;),
        summary: root.querySelector(&#x27;#stage-summary&#x27;),
        input: root.querySelector(&#x27;#stage-input&#x27;),
        functionName: root.querySelector(&#x27;#stage-function&#x27;),
        output: root.querySelector(&#x27;#stage-output&#x27;),
        storage: root.querySelector(&#x27;#stage-storage&#x27;),

      const stages = {

          input: &#x27;daily_price_raw + corporate_actions&#x27;, functionName: &#x27;build_adjustment_factors()&#x27;,

          input: &#x27;10개 데이터셋 + 657개 검증 증거&#x27;, functionName: &#x27;validate_repository_snapshot() / validate_cross_validation_gate()&#x27;,

          code: &#x27;snapshot_report.raise_for_errors()\ncross = validate_cross_validation_gate(repository, release)\nassert cross[&quot;price_unresolved_count&quot;] == 0&#x27;

          input: &#x27;검증된 데이터셋 버전 10개&#x27;, functionName: &#x27;LocalDatasetRepository.commit_release()&#x27;,

          code: &#x27;publish_repository(repository, r2, datasets)\ndownloaded = DatasetCache(tmp, r2).sync_release()\ncompare_repository_snapshots(local, fresh, release, ...)&#x27;

          code: &#x27;data = ParquetMarketDataProvider(cache).load(config, symbols, ...)\nresult = run_backtest_on_data(config, data)\nsave_backtest_result(result, config, results_dir)&#x27;

      const selectStage = (key) =&gt; {
        const stage = stages[key];
        if (!stage) return;
        buttons.forEach((button) =&gt; {
          const active = button.dataset.stage === key;
          button.setAttribute(&#x27;aria-pressed&#x27;, String(active));
          button.classList.toggle(&#x27;btn-primary&#x27;, active);
        });
        fields.number.textContent = stage.number;
        fields.title.textContent = stage.title;
        fields.summary.textContent = stage.summary;
        fields.input.textContent = stage.input;
        fields.functionName.textContent = stage.functionName;
        fields.output.textContent = stage.output;
        fields.storage.textContent = stage.storage;

    })();

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
