name: research_kr
market: KR
universe:
  source: profiles
  profiles:
    KR: [kospi200, kosdaq150]
  refresh: daily
  snapshot_dir: state/universes
  filters:
    enabled: true
    exclude_managed: true
    exclude_suspended: true
    exclude_delisting: true
    exclude_etf_etn: true
    exclude_spac: true
    exclude_preferred: true
    min_price:
      US: 5
      KR: 1000
    avg_turnover_window: 20
    min_avg_turnover:
      US: 10000000
      KR: 1000000000
    min_history_daily_bars: 120

data:
  timeframe: 1d
  period: max

# US Parquet is V1. KR keeps the legacy source until the same contracts exist.
data_store:
  provider: yahoo
  auto_sync: false
  price_mode: raw
  dividend_tax_rate: 0
  incomplete_action_policy: warn
  local_cache_dir: data/cache
  index_source_mode: best_effort

capital:
  initial_cash: 10000000

costs:
  fee_rate: 0.00225
  slippage_rate: 0.0005

execution:
  order_type: market
  broker: paper
  live_confirm_required: true

paper:
  state_file: state/research_kr_paper.json
  results_dir: results/research/kr/paper
  loop_interval_seconds: 60
  run_once_per_candle: true

backtest:
  results_dir: results/research/kr/backtests
