name: main_jo_live_leader_rotation
type: leader_rotation
portfolio:
  max_positions: 1
  allocation_pct: 0.9
signals:
  entries:
  - type: supertrend
    enabled: true
    period: 7
    multiplier: 3.0
    atr_method: ewm
    symbol_multipliers:
      SOXL: 4.5
      SOXS: 4.5
  filters:
  - type: benchmark_trend
    enabled: true
    timeframe: 1h
  - type: relative_strength
    lookback_bars:
      US: 130
      KR: 100
      default: 100
  exits:
  - type: supertrend_flip
    confirm_bars: 1
rotation:
  hurdle:
    multiplier: 1.25
  allow_late_chase: true
  min_rotation_profit_pct: 0.0
