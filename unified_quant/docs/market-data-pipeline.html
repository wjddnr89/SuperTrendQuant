.btn:focus-visible {

svg {

    #stq-system-map {
      color: var(--foreground);
      display: grid;
      gap: 2rem;
      width: 100%;
    }

    #stq-system-map .map-section {
      display: grid;
      gap: 0.9rem;
      padding-top: 0.25rem;
    }

    #stq-system-map .map-section + .map-section {
      border-top: 1px solid var(--border);
      padding-top: 1.75rem;
    }

    #stq-system-map h2,
    #stq-system-map h3,
    #stq-system-map p,
    #stq-system-map ul,
    #stq-system-map ol,
    #stq-system-map pre {
      margin: 0;
    }

    #stq-system-map .viz-controls {
      align-items: center;
      justify-content: space-between;
    }

    #stq-system-map .focus-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
    }

    #stq-system-map .selected-detail {
      margin: 0;
    }

    #stq-system-map .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      color: var(--muted-foreground);
    }

    #stq-system-map .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }

    #stq-system-map .swatch {
      width: 0.8rem;
      height: 0.8rem;
      border-radius: 50%;
      display: inline-block;
    }

    #stq-system-map .swatch-source { background: var(--viz-series-1); }
    #stq-system-map .swatch-process { background: var(--viz-series-2); }
    #stq-system-map .swatch-store { background: var(--viz-series-3); }
    #stq-system-map .swatch-query { background: var(--viz-series-4); }
    #stq-system-map .swatch-run { background: var(--viz-series-5); }

    #stq-system-map .system-svg,
    #stq-system-map .runtime-svg,
    #stq-system-map .relation-svg {
      display: block;
      width: 100%;
      height: auto;
      color: var(--foreground);
    }

    #stq-system-map .system-svg text,
    #stq-system-map .runtime-svg text,
    #stq-system-map .relation-svg text {
      fill: var(--foreground);
      font-family: var(--font-sans);
      font-size: var(--font-size-base);
      font-weight: 400;
    }

    #stq-system-map .system-svg .svg-small,
    #stq-system-map .runtime-svg .svg-small,
    #stq-system-map .relation-svg .svg-small {
      fill: var(--muted-foreground);
      font-size: max(11px, calc(var(--font-size-base) - 2px));
    }

    #stq-system-map .system-svg .svg-fn,
    #stq-system-map .runtime-svg .svg-fn,
    #stq-system-map .relation-svg .svg-fn {
      font-family: var(--font-mono);
      font-weight: 500;
    }

    #stq-system-map .svg-node {
      stroke: var(--border);
      stroke-width: 1.5;
    }

    #stq-system-map .svg-source { fill: color-mix(in srgb, var(--viz-series-1) 13%, var(--background)); }
    #stq-system-map .svg-process { fill: color-mix(in srgb, var(--viz-series-2) 13%, var(--background)); }
    #stq-system-map .svg-store { fill: color-mix(in srgb, var(--viz-series-3) 13%, var(--background)); }
    #stq-system-map .svg-query { fill: color-mix(in srgb, var(--viz-series-4) 13%, var(--background)); }
    #stq-system-map .svg-run { fill: color-mix(in srgb, var(--viz-series-5) 13%, var(--background)); }
    #stq-system-map .svg-live { fill: color-mix(in srgb, var(--viz-series-6) 13%, var(--background)); }
    #stq-system-map .svg-neutral { fill: color-mix(in srgb, var(--foreground) 5%, var(--background)); }

    #stq-system-map .svg-flow {
      fill: none;
      stroke: var(--muted-foreground);
      stroke-width: 2;
    }

    #stq-system-map .svg-flow-dashed {
      stroke-dasharray: 7 5;
    }

    #stq-system-map .svg-link {
      fill: none;
      stroke: var(--border);
      stroke-width: 2;
    }

    #stq-system-map [data-path] {
      transition: opacity 180ms ease, outline-color 180ms ease;
    }

    #stq-system-map .is-dimmed {
      opacity: 0.18;
    }

    #stq-system-map .mobile-architecture,
    #stq-system-map .runtime-mobile {
      display: none;
    }

    #stq-system-map .mobile-flow,
    #stq-system-map .function-chain,
    #stq-system-map .daily-timeline {

      padding: 0;
      display: grid;
      gap: 0.5rem;
    }

    #stq-system-map .mobile-step,

      padding: 0.75rem 0.8rem;
      border-left: 3px solid var(--border);
      min-width: 0;
    }

    #stq-system-map .mobile-step:not(:last-child)::after,
    #stq-system-map .chain-step:not(:last-child)::after,
    #stq-system-map .timeline-step:not(:last-child)::after {
      content: &quot;↓&quot;;
      position: absolute;
      left: 0.55rem;
      bottom: -0.85rem;
      color: var(--muted-foreground);
    }

    #stq-system-map .mobile-step strong,
    #stq-system-map .chain-step strong,
    #stq-system-map .timeline-step strong {
      display: block;
      font-weight: 500;
    }

    #stq-system-map .chain-8 {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.65rem;
    }

    #stq-system-map .chain-8 .chain-step {
      border-left: 0;
      border-top: 3px solid var(--border);
    }

    #stq-system-map .chain-8 .chain-step:not(:last-child)::after {
      content: &quot;→&quot;;
      left: auto;
      right: -0.65rem;
      top: 0.55rem;
      bottom: auto;
    }

    #stq-system-map .function-name {
      display: block;
      margin-bottom: 0.3rem;
      overflow-wrap: anywhere;
    }

    #stq-system-map .dataset-grid,
    #stq-system-map .object-grid,
    #stq-system-map .critical-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.65rem 1rem;
    }

    #stq-system-map .dataset-row,
    #stq-system-map .object-row,
    #stq-system-map .critical-item {
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--border);
      min-width: 0;
    }

    #stq-system-map .dataset-row strong,
    #stq-system-map .object-row strong,
    #stq-system-map .critical-item strong {
      display: block;
      font-weight: 500;
    }

    #stq-system-map .dual-stream {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.75rem;
    }

    #stq-system-map .stream {
      padding: 0.8rem;
      border-top: 4px solid var(--border);
    }

    #stq-system-map .stream-signal { border-top-color: var(--viz-series-4); }
    #stq-system-map .stream-execution { border-top-color: var(--viz-series-2); }

    #stq-system-map .stream strong {
      display: block;
      font-weight: 500;
      margin-bottom: 0.3rem;
    }

    #stq-system-map pre {
      padding: 0.8rem;
      background: var(--muted);
      color: var(--foreground);
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      border-radius: 0.5rem;
    }

    #stq-system-map .data-contract {
      display: grid;
      grid-template-columns: minmax(0, 0.75fr) minmax(0, 1.25fr);
      gap: 0.5rem 1rem;
      align-items: start;
    }

    #stq-system-map .contract-name,
    #stq-system-map .contract-value {
      padding: 0.55rem 0;
      border-bottom: 1px solid var(--border);
      min-width: 0;
    }

    #stq-system-map .contract-name {
      font-family: var(--font-mono);
      font-weight: 500;
      overflow-wrap: anywhere;
    }

    #stq-system-map .daily-timeline {
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 0.35rem;
    }

    #stq-system-map .daily-timeline .timeline-step {
      border-left: 0;
      border-top: 3px solid var(--border);
    }

    #stq-system-map .daily-timeline .timeline-step:not(:last-child)::after {
      content: &quot;→&quot;;
      left: auto;
      right: -0.45rem;
      top: 0.55rem;
      bottom: auto;
    }

      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 0.6rem;
    }

      width: 0.8rem;
      height: 0.8rem;
      border-radius: 50%;
      background: var(--destructive);
    }

      }

      #stq-system-map .dataset-grid,
      #stq-system-map .object-grid,
      #stq-system-map .critical-grid,
      #stq-system-map .dual-stream,
      #stq-system-map .daily-timeline,
      #stq-system-map .data-contract {
        grid-template-columns: 1fr;
      }

      #stq-system-map .chain-8 .chain-step,
      #stq-system-map .daily-timeline .timeline-step {
        border-top: 0;
        border-left: 3px solid var(--border);
      }

      #stq-system-map .chain-8 .chain-step:not(:last-child)::after,

        content: &quot;↓&quot;;
        left: 0.55rem;
        right: auto;
        top: auto;
        bottom: -0.85rem;
      }

      #stq-system-map .contract-name {
        border-bottom: 0;
        padding-bottom: 0;
      }

      #stq-system-map .contract-value {
        padding-top: 0.2rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      #stq-system-map [data-path] {
        transition: none;
      }
    }

      &lt;li class=&quot;timeline-step&quot;&gt;&lt;strong&gt;③ Preflight&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;local/R2 session 비교&lt;/span&gt;&lt;/li&gt;
      &lt;li class=&quot;timeline-step&quot;&gt;&lt;strong&gt;④ Pull 또는 Sync&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;R2 우선, stale이면 공급자 1회&lt;/span&gt;&lt;/li&gt;
      &lt;li class=&quot;timeline-step&quot;&gt;&lt;strong&gt;⑤ Validate·Release&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;오류면 이전 release 유지&lt;/span&gt;&lt;/li&gt;
      &lt;li class=&quot;timeline-step&quot;&gt;&lt;strong&gt;⑥ 실행&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;backtest/research/paper/live&lt;/span&gt;&lt;/li&gt;
    &lt;/ol&gt;
    &lt;pre&gt;&lt;code&gt;# 최초 또는 강제 최신화
uv run quant-data --strategy ... --runtime ... sync --backfill-start 2000-01-01

# 공식 지수 자료 입력
uv run quant-data --strategy ... --runtime ... import-index --kind anchor ... --official
uv run quant-data --strategy ... --runtime ... import-index --kind events ... --official

# 무결성 확인과 R2 발행
uv run quant-data --strategy ... --runtime ... validate
uv run quant-data --strategy ... --runtime ... sync --publish&lt;/code&gt;&lt;/pre&gt;
  &lt;/section&gt;

  &lt;section class=&quot;map-section&quot; aria-labelledby=&quot;critical-heading&quot;&gt;
    &lt;h2 id=&quot;critical-heading&quot;&gt;10. 이 프로젝트를 이해할 때 놓치면 안 되는 사항&lt;/h2&gt;
    &lt;div class=&quot;critical-grid&quot;&gt;
      &lt;div class=&quot;critical-item&quot;&gt;&lt;strong&gt;SQL은 저장소가 아니라 조회 언어&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;원본은 Parquet에 남고 DuckDB는 메모리에서 &lt;code&gt;read_parquet()&lt;/code&gt;로 직접 조회합니다. Parquet→SQL DB→Parquet 변환은 없습니다.&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;critical-item&quot;&gt;&lt;strong&gt;지수 구성 복원과 지수값 복제는 다름&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;anchor와 실제 ADD/REMOVE로 구성종목을 복원하지만 divisor·float weight·공식 index level까지 재현하지는 않습니다.&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;critical-item&quot;&gt;&lt;strong&gt;신호 가격과 경제 현실 가격은 다름&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;조정 OHLC는 전략 신호용, raw OHLC와 기업행동 원장은 체결·계좌·성과용입니다.&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;critical-item&quot;&gt;&lt;strong&gt;Live 잔고의 진실은 Toss&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;로컬 기업행동 계산으로 주문을 만들지 않고 실제 브로커 cash·position을 기준으로 안전 검사를 합니다.&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;critical-item&quot;&gt;&lt;strong&gt;현재 실제 데이터는 아직 비어 있음&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;2026-07-16 확인 기준 코드와 테스트는 준비됐지만 &lt;code&gt;data/cache&lt;/code&gt;와 최초 release는 없습니다. 환경변수와 백필·공식 지수 입력이 필요합니다.&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;critical-item&quot;&gt;&lt;strong&gt;V1은 미국 완료 일봉만&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;Parquet provider는 &lt;code&gt;timeframe=1d&lt;/code&gt;만 지원합니다. 분봉은 &lt;code&gt;BarSource&lt;/code&gt;·메모리 overlay 인터페이스만 준비되어 있습니다.&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;status-line card&quot;&gt;
      &lt;span class=&quot;status-dot&quot; aria-hidden=&quot;true&quot;&gt;&lt;/span&gt;
      &lt;span&gt;&lt;strong&gt;현재 운영 상태:&lt;/strong&gt; 코드 구현·143개 테스트 통과 / 실제 백필·공식 지수 데이터·R2 최초 발행은 미실행&lt;/span&gt;
    &lt;/div&gt;
  &lt;/section&gt;

  &lt;script&gt;
    (() =&gt; {
      const root = document.getElementById(&#x27;stq-system-map&#x27;);
      if (!root) return;

      const buttons = Array.from(root.querySelectorAll(&#x27;[data-focus]&#x27;));
      const pathItems = Array.from(root.querySelectorAll(&#x27;[data-path]&#x27;));
      const detail = root.querySelector(&#x27;.selected-detail&#x27;);
      const messages = {
        all: &#x27;외부 원천 → 검증된 Parquet release → DuckDB SQL → MarketData → 백테스트·Paper·Live로 이어집니다.&#x27;,
        collect: &#x27;SEC·Nasdaq Trader·Yahoo·공식 지수 파일을 정규화하고 검증한 뒤, 불변 Parquet 버전과 release로 저장·발행합니다.&#x27;,
        query: &#x27;DuckDB가 release에 고정된 Parquet 파일에서 종목·기간·열만 읽고 조정 신호와 raw 실행 스트림을 동시에 만듭니다.&#x27;,
        backtest: &#x27;과거 시점별 universe와 조정 bars로 신호를 만들고 다음 raw 시가와 기업행동 원장으로 체결·성과를 계산합니다.&#x27;,
        paper: &#x27;완료 일봉 신호, 별도 QuoteProvider 가격, 지속되는 PaperBroker 상태를 결합해 실제 주문 없이 같은 전략 경로를 검증합니다.&#x27;,
        live: &#x27;완료 Parquet 일봉은 신호에만 쓰고 Toss의 실제 계좌·실시간 호가·안전 검사를 통과한 주문만 API로 전송합니다.&#x27;
      };

      function selectFocus(focus) {
        buttons.forEach((button) =&gt; {
          const active = button.dataset.focus === focus;
          button.setAttribute(&#x27;aria-pressed&#x27;, String(active));
          button.classList.toggle(&#x27;btn-primary&#x27;, active);
        });

        pathItems.forEach((item) =&gt; {
          const paths = (item.dataset.path || &#x27;&#x27;).split(/\s+/).filter(Boolean);
          const visible = focus === &#x27;all&#x27; || paths.includes(&#x27;shared&#x27;) || paths.includes(focus);
          item.classList.toggle(&#x27;is-dimmed&#x27;, !visible);
        });

        if (detail) detail.textContent = messages[focus] || messages.all;
      }

      buttons.forEach((button) =&gt; {
        button.addEventListener(&#x27;click&#x27;, () =&gt; selectFocus(button.dataset.focus || &#x27;all&#x27;));
      });
    })();
  &lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;

(() =&gt; {
  const initialize = () =&gt; {
    globalThis.lucide?.createIcons({ attrs: { width: 16, height: 16 } });

&lt;/script&gt;
